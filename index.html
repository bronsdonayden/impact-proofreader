<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMPACT WEBAPP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Kidney & Spleen Ultrasound Images</h1>
    <p class="subtitle">Mask Proofreading & Overlay Viewer</p>
  </header>

  <main>
    
    <!-- Start Toolbar-->
    <div class="Sidebar">
    
      <!-- File loading -->
      <div class="toolGroup">
        <label for="images">Load Images</label>
        <input type="file" id="images" accept=".png" multiple>
      </div>

      <div class="toolGroup">
        <label for="masks">Load Masks</label>
        <input type="file" id="masks" accept=".png" multiple>
      </div>

      <!-- Overlay Options -->
      <div class="toolGroup">
        <select id = "overlayMode">
          <option>No Overlay</option>
          <option>Outline Only</option>
          <option>Transparent Overlay</option>
        </select>
      </div>

       <!-- Change Contrast and Opacity Slider -->
       <div class="toolGroup">
        <label>Contrast</label>
        <input type="range" min="0" max="255" value="128">
        <label>Opacity</label>
        <input type="range" min="0" max="255" value="128">
      </div>

      <!-- Zoom -->
      <div class="toolGroup">
        <label>Zoom</label>
        <input type="range" id="zoomSlider" min="1" max="3" value="1" step="0.1">
      </div>

      
      <!-- Next Image Button -->
      <div class="toolGroup">
        <button id="nextButton">Confirm and Show Next Image</button>
      </div>
      
    <!-- End Toolbar-->

    <!-- Image Interaction Options -->
    <div class="toolGroup">
      <button id="paintButton">Paint</button>
      <button id="eraseButton">Erase</button>
    </div>
    </div>

    <!-- Start Viewer -->
    <div class="Viewer">
      <div class="canvasContainer">
        <img id="display" src="" alt="Image could not load">
        <canvas id="overlay"></canvas>
      </div>
    </div>
    <!-- End Viewer-->

  </main>

  <!-- Copyright because why not it makes the website seem super duper important-->
  <footer>
    <p>&copy; 2026</p>
  </footer>

  <script src="main.js"></script>
  <script src="overlay.js"></script>
  <script src="navigation.js"></script>
   <!-- for now  also the contrast and opacity are ( still doesnt work)-->
  <script src="zoom.js"></script>
</body>
</html>
